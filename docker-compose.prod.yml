version: '3.8'

# GoTAK Production Docker Compose Configuration
services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: gotak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gotak}
      POSTGRES_USER: ${POSTGRES_USER:-gotak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - gotak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gotak} -d ${POSTGRES_DB:-gotak}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Redis for caching and session management
  redis:
    image: redis:7.2-alpine
    container_name: gotak-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-gotak_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - gotak-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # GoTAK Application Server
  gotak:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${GOTAK_VERSION:-1.0.0}
        BUILD_TIME: ${BUILD_TIME}
        GIT_COMMIT: ${GIT_COMMIT}
    container_name: gotak-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database Configuration
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-gotak}
      POSTGRES_USER: ${POSTGRES_USER:-gotak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-gotak_redis}
      
      # Application Configuration
      JWT_SECRET: ${JWT_SECRET}
      GOTAK_CONFIG_PATH: /app/config/production.yaml
      GOTAK_LOG_LEVEL: ${GOTAK_LOG_LEVEL:-info}
      GOTAK_DATA_DIR: /app/data
      GOTAK_LOG_DIR: /app/logs
      
      # TLS Configuration
      GOTAK_GENERATE_CERTS: ${GOTAK_GENERATE_CERTS:-false}
      GOTAK_SERVER_NAME: ${GOTAK_SERVER_NAME:-localhost}
      
      # Runtime Configuration
      GIN_MODE: release
      TZ: ${TZ:-UTC}
    volumes:
      - gotak_data:/app/data
      - gotak_logs:/app/logs
      - gotak_certs:/app/certs
      - ./config/production.yaml:/app/config/production.yaml:ro
    ports:
      - "${GOTAK_HTTP_PORT:-8080}:8080"    # HTTP API and Web Interface
      - "${GOTAK_TAK_PORT:-8087}:8087"     # TAK Protocol (TCP/UDP)
      - "${GOTAK_TLS_PORT:-8089}:8089"     # TAK Protocol over TLS
    networks:
      - gotak-network
    healthcheck:
      test: ["/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:1.24-alpine
    container_name: gotak-nginx
    restart: unless-stopped
    depends_on:
      - gotak
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - letsencrypt_certs:/etc/letsencrypt:ro
    networks:
      - gotak-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    profiles:
      - nginx

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: gotak-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - gotak-network
    profiles:
      - monitoring

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.0.3
    container_name: gotak-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - gotak-network
    profiles:
      - monitoring

# Named volumes for persistent data
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  gotak_data:
    driver: local
  gotak_logs:
    driver: local
  gotak_certs:
    driver: local
  nginx_logs:
    driver: local
  letsencrypt_certs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Networks
networks:
  gotak-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
