---
# Single-node Kafka (KRaft, no Zookeeper) for the Communications message bus,
# IN the Consul mesh (sidecar injected; gotak-server reaches it via mTLS,
# governed by the gotak-server->kafka intention in consul-intentions.yaml).
#
# Runs under restricted-v2 (arbitrary uid) so the consul-dataplane sidecar can
# co-validate (anyuid + the injector's seccomp annotations can't share an SCC).
# apache/kafka wants to write /opt/kafka/config + logs, which an arbitrary uid
# can't do in the image layer — an initContainer seeds them into emptyDirs that
# the assigned uid writes via fsGroup.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
  template:
    metadata:
      labels: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        k8s.v1.cni.cncf.io/networks: consul-cni
    spec:
      initContainers:
        - name: seed-config
          image: docker.io/apache/kafka:3.9.0
          command: ["sh","-c","cp -aL /opt/kafka/config/. /mnt/config/"]
          volumeMounts:
            - { name: config, mountPath: /mnt/config }
      containers:
        - name: kafka
          image: docker.io/apache/kafka:3.9.0
          ports: [ { containerPort: 9092, name: kafka } ]
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: KAFKA_LOG_DIRS, value: "/var/lib/kafka/data" }
            # Bound the broker heap so an in-pod console-consumer (the "watch"
            # command) can't OOM the broker.
            - { name: KAFKA_HEAP_OPTS, value: "-Xmx768m -Xms768m" }
          volumeMounts:
            - { name: config, mountPath: /opt/kafka/config }
            - { name: logs, mountPath: /opt/kafka/logs }
            - { name: data, mountPath: /var/lib/kafka/data }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 768Mi }
            limits:   { cpu: "1", memory: 2Gi }
      volumes:
        - { name: config, emptyDir: {} }
        - { name: logs, emptyDir: {} }
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
spec:
  selector: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
  ports:
    - { port: 9092, targetPort: 9092, name: kafka }
