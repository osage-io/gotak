---
apiVersion: v1
kind: ServiceAccount
metadata: { name: gotak-kafka, namespace: gotak }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: gotak-kafka-anyuid, namespace: gotak }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: system:openshift:scc:anyuid }
subjects: [ { kind: ServiceAccount, name: gotak-kafka, namespace: gotak } ]
---
# Single-node Kafka (KRaft, no Zookeeper) for the Communications message bus.
# Demo-grade: ephemeral storage (emptyDir), auto-create topics, no auth.
# Out of the Consul mesh (annotation) — gotak-server reaches it via tproxy
# passthrough. The gotak app's Argo Application globs openshift/*.yaml, so this
# deploys with the rest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
  template:
    metadata:
      labels: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
      annotations:
        consul.hashicorp.com/connect-inject: "false"
    spec:
      serviceAccountName: gotak-kafka
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: kafka
          image: docker.io/apache/kafka:3.9.0   # multi-arch (arm64)
          ports:
            - { containerPort: 9092, name: kafka }
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: KAFKA_LOG_DIRS, value: "/var/lib/kafka/data" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits:   { cpu: "1", memory: 1Gi }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
spec:
  selector: { app.kubernetes.io/name: gotak, app.kubernetes.io/component: kafka }
  ports:
    - { port: 9092, targetPort: 9092, name: kafka }
