# Consul on Single-Node OpenShift — single server, demo-grade.
# Deployed into the same `gotak` namespace as Vault and the app.
global:
  name: consul
  datacenter: gotak
  openshift:
    enabled: true
  # Fully-qualify to docker.io — the cluster's unqualified-search resolves bare
  # hashicorp/* names to registry.connect.redhat.com (where they don't exist).
  image: docker.io/hashicorp/consul:2.0.0
  imageK8S: docker.io/hashicorp/consul-k8s-control-plane:2.0.0
  imageConsulDataplane: docker.io/hashicorp/consul-dataplane:2.0.0
  # OpenShift's ingress-operator already owns the Gateway API CRDs, so don't let
  # the chart install them (the ownership conflict fails the whole Argo sync).
  # Consul's API Gateway controller uses the cluster's existing CRDs.
  installK8sNetworkingCRDs: false

server:
  replicas: 1
  bootstrapExpect: 1
  # Official image is multi-arch; runs on the arm64 node as-is.
  storage: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

client:
  enabled: true

ui:
  enabled: true
  service:
    type: ClusterIP

# ---------------------------------------------------------------------------
# Service mesh (Connect). Every app pod in the gotak namespace gets an Envoy
# sidecar automatically (default: true) — opt a pod out with the annotation
# consul.hashicorp.com/connect-inject: "false" (Vault sets that; Consul's own
# pods are excluded by the chart).
#
# OpenShift note: transparent-proxy traffic redirection is done by the Consul
# CNI plugin (via Multus) instead of a privileged init container, so the
# sidecars run under the restricted SCC.
# ---------------------------------------------------------------------------
connectInject:
  enabled: true
  # The chart-managed GatewayClass ("consul") is the only class the consul-k8s
  # gateway controller reconciles — custom classes sit at "Waiting for
  # controller" forever. Front the gateway with our edge Route instead of a
  # cloud LB: ClusterIP.
  apiGateway:
    managedGatewayClass:
      serviceType: ClusterIP
  default: true              # inject all pods in the namespace by default
  # Scope injection to the gotak namespace ONLY. Without this the injector
  # (default-inject + allow-namespace "*") meshes cluster infrastructure —
  # image-registry, metrics-server, CSI pods — which pollutes the catalog and,
  # once redirection works, would default-deny core cluster traffic.
  k8sAllowNamespaces: ["gotak"]
  # Ignore (not the chart default "Fail"): if the injector pod is ever down, pods
  # just deploy without a sidecar instead of being BLOCKED cluster-wide. With
  # "Fail" a broken injector deadlocks the control plane (openshift-apiserver
  # can't create its own pods) — which is exactly what bit us on first sync.
  failurePolicy: "Ignore"
  transparentProxy:
    defaultEnabled: true
  cni:
    enabled: true
    logLevel: info
    multus: true
    cniBinDir: "/var/lib/cni/bin"
    cniNetDir: "/etc/kubernetes/cni/net.d"

# Catalog sync not needed — k8s Services are the source of truth for the mesh.
syncCatalog:
  enabled: false
