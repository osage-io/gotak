# Vault on Single-Node OpenShift — demo-grade, single replica, AWS KMS auto-unseal.
#
# Storage:  integrated raft (single node).
# Seal:     awskms — the stanza is declared here; the key id, region, and AWS
#           creds are injected as env vars by install-platform.sh (key id/region
#           via --set, creds via the vault-aws-creds Secret below). This keeps the
#           per-run KMS key id out of version control.
# Exposure: an OpenShift Route (edge TLS) is created by this chart so the gotak
#           browser can reach Vault directly. CORS is enabled post-init.
global:
  openshift: true

# Fully-qualify images to docker.io (the cluster resolves bare hashicorp/* to
# registry.connect.redhat.com, where they don't exist).
injector:
  image:
    repository: docker.io/hashicorp/vault-k8s
  agentImage:
    repository: docker.io/hashicorp/vault
  # Single-node cluster: disable pod anti-affinity
  affinity: null
  # Stay out of the Consul mesh. The injector's webhook is called by the
  # kube-apiserver (not a mesh member), so a consul-dataplane sidecar +
  # transparent proxy walls it off and the rollout wedges. Same exclusion the
  # Vault server pod has.
  annotations:
    consul.hashicorp.com/connect-inject: "false"

ui:
  enabled: true

server:
  image:
    repository: docker.io/hashicorp/vault
  # Official image is multi-arch; schedules on the arm64 (Graviton) node as-is.
  # Stay out of the Consul mesh: the gotak browser reaches Vault via its Route +
  # CORS, not through a sidecar — a transparent-proxy sidecar would break that path.
  annotations:
    consul.hashicorp.com/connect-inject: "false"

  dataStorage:
    enabled: true
    size: 2Gi
    accessMode: ReadWriteOnce

  # Shamir seal (manual unseal) - no AWS KMS dependencies
  # Note: Vault will need to be manually unsealed after each restart
  # extraEnvironmentVars:
  #   VAULT_AWSKMS_SEAL_KEY_ID: alias/gotak-vault-unseal
  #   AWS_REGION: us-east-2

  # AWS creds disabled for Shamir seal
  # extraSecretEnvironmentVars:
  #   - envName: AWS_ACCESS_KEY_ID
  #     secretName: vault-aws-creds
  #     secretKey: AWS_ACCESS_KEY_ID
  #   - envName: AWS_SECRET_ACCESS_KEY
  #     secretName: vault-aws-creds
  #     secretKey: AWS_SECRET_ACCESS_KEY
  #   - envName: AWS_SESSION_TOKEN
  #     secretName: vault-aws-creds
  #     secretKey: AWS_SESSION_TOKEN

  # OpenShift Route — gotak's UI calls Vault from the browser, so Vault needs a
  # reachable external URL (not just the ClusterIP service).
  route:
    enabled: true
    host: ""              # let OpenShift assign apps.<cluster-domain>
    # Lock Vault to dan's home IP until Boundary brokers this instead.
    annotations:
      haproxy.router.openshift.io/ip_whitelist: "143.105.191.161/32"
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

  standalone:
    enabled: false

  ha:
    enabled: true
    replicas: 1
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable     = 1
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"
        }

        # Shamir seal (manual unseal) - no AWS KMS
        # seal "awskms" {}

        service_registration "kubernetes" {}
