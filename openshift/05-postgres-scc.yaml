---
# The postgis image runs as a fixed UID, so its ServiceAccount needs the anyuid
# SCC. Declared here (instead of `oc adm policy add-scc-to-user`) so GitOps grants
# it. Binds the anyuid SCC's auto-generated ClusterRole to the gotak-postgres SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gotak-postgres-anyuid
  namespace: gotak
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: database
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: gotak-postgres
    namespace: gotak
