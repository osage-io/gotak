---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gotak-web-config
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
data:
  # The browser hits these directly, so they're the external demoland.io hostnames
  # (API Gateway + Vault Route), baked in for GitOps. deploy.sh can still override
  # them from live Route hosts for the non-GitOps path.
  GOTAK_API_URL: "https://gotak.demoland.io"
  GOTAK_WS_URL: "wss://gotak.demoland.io/ws"
  VAULT_ADDR: "https://vault.demoland.io"
  MAP_DEFAULT_LAT: "38.9072"
  MAP_DEFAULT_LNG: "-77.0369"
  MAP_DEFAULT_ZOOM: "12"
  ENABLE_CHAT: "true"
  ENABLE_DRAWING: "true"
---
# In-cluster nginx config, mounted over the image's /etc/nginx/conf.d. Differs
# from web/nginx.conf (local dev) in two ways:
#   - no /api //ws proxies to host.docker.internal (unresolvable in-cluster ->
#     nginx dies at config parse; the SPA calls the API Gateway's absolute
#     demoland.io URLs anyway)
#   - CSP connect-src allows https: so browser calls to gotak/vault.demoland.io
#     aren't blocked
apiVersion: v1
kind: ConfigMap
metadata:
  name: gotak-web-nginx
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
data:
  nginx.conf: |
    server {
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https: ws: wss:; object-src 'none';" always;

        # Client-side routing (React Router)
        location / {
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        error_page 404 /index.html;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotak-web
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gotak
      app.kubernetes.io/component: web-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotak
        app.kubernetes.io/component: web-ui
      annotations:
        # Fully in the mesh — the only ingress is the Consul API Gateway, so no
        # Route and no inbound exclusions. Reachable only via gateway -> gotak-web
        # (see consul-intentions.yaml).
        consul.hashicorp.com/connect-inject: "true"
    spec:
      # Pull secret for the private ghcr.io image (created by the
      # iac/gotak-registry-secret Terraform workspace).
      imagePullSecrets:
        - name: ghcr
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gotak-web
          image: ghcr.io/osage-io/gotak-web:latest
          imagePullPolicy: Always
          # NOTE: OpenShift restricted SCC runs as non-root, so the web image's
          # nginx must listen on 8080 (not 80). Adjust the web Dockerfile/nginx.conf
          # if it still binds :80. See README.
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: gotak-web-config
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: gotak-web-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: gotak-web
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
spec:
  selector:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
  ports:
    - port: 8080
      targetPort: 8080
      name: http
