---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gotak-web-config
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
data:
  # The browser hits these directly, so they're the external demoland.io hostnames
  # (API Gateway + Vault Route), baked in for GitOps. deploy.sh can still override
  # them from live Route hosts for the non-GitOps path.
  GOTAK_API_URL: "https://gotak.demoland.io"
  GOTAK_WS_URL: "wss://gotak.demoland.io/ws"
  VAULT_ADDR: "https://vault.demoland.io"
  MAP_DEFAULT_LAT: "38.9072"
  MAP_DEFAULT_LNG: "-77.0369"
  MAP_DEFAULT_ZOOM: "12"
  ENABLE_CHAT: "true"
  ENABLE_DRAWING: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotak-web
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gotak
      app.kubernetes.io/component: web-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotak
        app.kubernetes.io/component: web-ui
      annotations:
        # Fully in the mesh — the only ingress is the Consul API Gateway, so no
        # Route and no inbound exclusions. Reachable only via gateway -> gotak-web
        # (see consul-intentions.yaml).
        consul.hashicorp.com/connect-inject: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gotak-web
          image: gotak-web:latest
          imagePullPolicy: IfNotPresent
          # NOTE: OpenShift restricted SCC runs as non-root, so the web image's
          # nginx must listen on 8080 (not 80). Adjust the web Dockerfile/nginx.conf
          # if it still binds :80. See README.
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: gotak-web-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gotak-web
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
spec:
  selector:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
  ports:
    - port: 8080
      targetPort: 8080
      name: http
