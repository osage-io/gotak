---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gotak-web-config
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
data:
  GOTAK_API_URL: "http://gotak-server:8080"
  GOTAK_WS_URL: "ws://gotak-server:8087/ws"
  # Vault address the browser talks to directly (transit/PKI/KV). Populated by
  # deploy.sh from the live `vault` Route if the platform is installed; otherwise
  # left blank and the UI falls back to its built-in default / config modal.
  VAULT_ADDR: ""
  MAP_DEFAULT_LAT: "38.9072"
  MAP_DEFAULT_LNG: "-77.0369"
  MAP_DEFAULT_ZOOM: "12"
  ENABLE_CHAT: "true"
  ENABLE_DRAWING: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotak-web
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gotak
      app.kubernetes.io/component: web-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotak
        app.kubernetes.io/component: web-ui
      annotations:
        # Join the Consul service mesh. This pod is also a Route edge, so exclude
        # the inbound http port from the proxy — the OpenShift router (not a mesh
        # member) must still reach nginx. Outbound calls remain mesh-governed.
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gotak-web
          image: gotak-web:latest
          imagePullPolicy: IfNotPresent
          # NOTE: OpenShift restricted SCC runs as non-root, so the web image's
          # nginx must listen on 8080 (not 80). Adjust the web Dockerfile/nginx.conf
          # if it still binds :80. See README.
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: gotak-web-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gotak-web
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
spec:
  selector:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: web-ui
  ports:
    - port: 8080
      targetPort: 8080
      name: http
