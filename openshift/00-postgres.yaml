---
# PostgreSQL (with PostGIS) for GoTAK — demo-grade, single replica.
# NOTE: the postgis image runs as a fixed UID, so the SA needs the `anyuid` SCC
# on OpenShift. See README (deploy.sh handles this).
apiVersion: v1
kind: Secret
metadata:
  name: gotak-db
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_DB: gotak
  POSTGRES_USER: gotak
  # Demo password — matches database.password in the gotak-server ConfigMap.
  POSTGRES_PASSWORD: tactical_secure_pass
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gotak-db
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gotak
      app.kubernetes.io/component: database
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gotak
        app.kubernetes.io/component: database
      annotations:
        # Join the mesh. Postgres has no Route, so all inbound is mesh-enforced:
        # only gotak-server may reach it (see consul-intentions.yaml).
        consul.hashicorp.com/connect-inject: "true"
    spec:
      serviceAccountName: gotak-postgres
      # Pin the postgres UID. The PVC data is owned by 999 (image's postgres
      # user, written under anyuid). Without this, SCC selection can flip to
      # restricted-v2 (e.g. when the consul sidecar's injected securityContext
      # changes admission) and postgres dies with "wrong ownership". Requesting
      # uid 999 forces anyuid (the SA's binding) deterministically.
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          # imresamu/postgis is multi-arch (arm64); the official postgis/postgis
          # is amd64-only -> "exec format error" on the Graviton node.
          image: docker.io/imresamu/postgis:15-3.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: gotak-db
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "gotak", "-d", "gotak"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gotak-db
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gotak-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: gotak
    app.kubernetes.io/component: database
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
