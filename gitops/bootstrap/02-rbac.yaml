---
# The platform charts create cluster-scoped objects (CRDs, GatewayClass) and SCCs,
# so the Argo application-controller needs broad rights. cluster-admin is the
# common choice for a platform GitOps instance; scope it down for multi-tenant use.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshift-gitops-app-controller-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
