---
# OpenShift GitOps (Argo CD), Red Hat operator. Installs into the global
# openshift-operators namespace and auto-creates a default Argo CD instance in
# the openshift-gitops namespace (with a console Route).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-operators
spec:
  channel: latest
  installPlanApproval: Automatic
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
