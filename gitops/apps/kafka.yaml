---
# Kafka — the Communications message bus. Its own Application so it shows up
# distinctly in Argo (rather than bundled in the gotak app). Wave 3: needs the
# Consul mesh + injector (wave 1) up so the sidecar injects. The
# ServiceDefaults + gotak-server->kafka intention live with the other mesh
# config in the `intentions` app (openshift/platform/consul-intentions.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/osage-io/gotak.git
    targetRevision: main
    path: openshift/kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: gotak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff: { duration: 15s, maxDuration: 5m, factor: 2 }
