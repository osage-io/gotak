---
# Consul (Helm) — chart from the HashiCorp repo, values from this git repo.
# Wave 1: brings up the service mesh + its CRDs before the gateway/intentions.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: consul
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://helm.releases.hashicorp.com
      chart: consul
      # 1.x line: consul 2.0.0's api-gateway served empty xDS (no listeners) — see
      # docs/DEPLOYMENT pitfalls. 1.9.8 = Consul 1.22.7, the mature gateway path.
      targetRevision: 1.9.8
      helm:
        valueFiles:
          - $values/openshift/platform/consul-values.yaml
    - repoURL: https://github.com/osage-io/gotak.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: gotak
  # Argo's SSA diff flags consul-server's volumeClaimTemplates even though a
  # server-side diff is empty (known StatefulSet normalization quirk). Ignore.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: consul-server
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff: { duration: 15s, maxDuration: 5m, factor: 2 }
