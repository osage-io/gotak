---
# The gotak app (postgres + server + web + SCC binding). Top-level openshift/*.yaml
# only (non-recursive, so it won't pull in openshift/platform/). Wave 3: deploy
# after the mesh + gateway so pods get sidecars injected.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gotak
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/osage-io/gotak.git
    targetRevision: main
    path: openshift
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: gotak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff: { duration: 15s, maxDuration: 5m, factor: 2 }
