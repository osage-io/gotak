---
# Consul service-mesh intentions (default-deny + allows).
# Wave 2: needs Consul's ServiceIntentions CRD from the consul app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: intentions
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/osage-io/gotak.git
    targetRevision: main
    path: openshift/platform
    directory:
      include: consul-intentions.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: gotak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff: { duration: 15s, maxDuration: 5m, factor: 2 }
