# GoTAK Tactical Web UI - Standalone Docker Compose
# For testing just the web interface without backend

version: '3.8'

services:
  gotak-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotak-tactical-ui-standalone
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      # Standalone configuration (no backend required)
      - GOTAK_SERVER_URL=ws://localhost:8087
      - GOTAK_API_URL=http://localhost:8087
      - GOTAK_WS_URL=ws://localhost:8087/ws
      
      # Map configuration
      - MAP_DEFAULT_LAT=38.9072
      - MAP_DEFAULT_LNG=-77.0369
      - MAP_DEFAULT_ZOOM=12
      - MAP_MAX_ZOOM=18
      - MAP_MIN_ZOOM=3
      
      # Feature toggles
      - ENABLE_CHAT=true
      - ENABLE_DRAWING=true
      - ENABLE_MEASUREMENTS=true
      - ENABLE_GEOFENCING=true
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
