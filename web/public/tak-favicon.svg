<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a1a1a" stroke="#00ff41" stroke-width="1"/>
  
  <!-- Crosshair -->
  <g stroke="#00ff41" stroke-width="1" fill="none">
    <!-- Outer circle -->
    <circle cx="16" cy="16" r="10" opacity="0.8"/>
    
    <!-- Crosshair lines -->
    <line x1="16" y1="3" x2="16" y2="8" stroke="#00ff41"/>
    <line x1="16" y1="24" x2="16" y2="29" stroke="#00ff41"/>
    <line x1="3" y1="16" x2="8" y2="16" stroke="#00ff41"/>
    <line x1="24" y1="16" x2="29" y2="16" stroke="#00ff41"/>
  </g>
  
  <!-- Center location pin -->
  <g transform="translate(16, 16)">
    <path d="M 0,-7 C -3.9,-7 -7,-3.9 -7,0 C -7,2.4 -5.8,4.5 -4,5.7 L 0,11 L 4,5.7 C 5.8,4.5 7,2.4 7,0 C 7,-3.9 3.9,-7 0,-7 Z" 
          fill="#ff6b35" 
          stroke="#ffffff" 
          stroke-width="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#ffffff"/>
  </g>
  
  <!-- Corner markers -->
  <g fill="#00ff41" opacity="0.6">
    <rect x="2" y="2" width="3" height="1"/>
    <rect x="2" y="2" width="1" height="3"/>
    
    <rect x="27" y="2" width="3" height="1"/>
    <rect x="29" y="2" width="1" height="3"/>
    
    <rect x="2" y="29" width="3" height="1"/>
    <rect x="2" y="27" width="1" height="3"/>
    
    <rect x="27" y="29" width="3" height="1"/>
    <rect x="29" y="27" width="1" height="3"/>
  </g>
</svg>