<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Background -->
  <rect width="180" height="180" fill="#1a1a1a"/>
  
  <!-- Border -->
  <rect x="5" y="5" width="170" height="170" fill="none" stroke="#00ff41" stroke-width="3"/>
  
  <!-- Large crosshair -->
  <g stroke="#00ff41" stroke-width="3" fill="none">
    <circle cx="90" cy="90" r="60" opacity="0.8"/>
    
    <!-- Crosshair lines -->
    <line x1="90" y1="15" x2="90" y2="45" stroke="#00ff41" stroke-width="4"/>
    <line x1="90" y1="135" x2="90" y2="165" stroke="#00ff41" stroke-width="4"/>
    <line x1="15" y1="90" x2="45" y2="90" stroke="#00ff41" stroke-width="4"/>
    <line x1="135" y1="90" x2="165" y2="90" stroke="#00ff41" stroke-width="4"/>
  </g>
  
  <!-- Center TAK pin -->
  <g transform="translate(90, 90)">
    <path d="M 0,-35 C -19.5,-35 -35,-19.5 -35,0 C -35,12 -29,22.5 -20,28.5 L 0,55 L 20,28.5 C 29,22.5 35,12 35,0 C 35,-19.5 19.5,-35 0,-35 Z" 
          fill="#ff6b35" 
          stroke="#ffffff" 
          stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#ffffff"/>
    <circle cx="0" cy="0" r="6" fill="#1a1a1a"/>
  </g>
  
  <!-- Corner markers -->
  <g fill="#00ff41" opacity="0.7">
    <rect x="10" y="10" width="20" height="4"/>
    <rect x="10" y="10" width="4" height="20"/>
    
    <rect x="150" y="10" width="20" height="4"/>
    <rect x="166" y="10" width="4" height="20"/>
    
    <rect x="10" y="166" width="20" height="4"/>
    <rect x="10" y="150" width="4" height="20"/>
    
    <rect x="150" y="166" width="20" height="4"/>
    <rect x="166" y="150" width="4" height="20"/>
  </g>
  
  <!-- TAK text -->
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ff41" text-anchor="middle" opacity="0.8">TAK</text>
</svg>