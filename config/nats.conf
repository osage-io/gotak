# NATS Server Configuration for GoTAK Development

# Server settings
port: 4222
host: "0.0.0.0"
server_name: "gotak-nats-dev"

# HTTP monitoring port
http_port: 8222

# Enable JetStream
jetstream: {
    # Store directory
    store_dir: "/data"
    
    # Limits
    max_memory_store: 256MB
    max_file_store: 2GB
}

# Simple authentication for development
authorization: {
    users: [
        {user: "gotak-server", password: "dev_server_pass"}
        {user: "gotak-client", password: "dev_client_pass"}
    ]
}

# Logging
log_file: "/dev/stdout"
log_size_limit: 32MB
debug: false
trace: false
logtime: true

# Clustering disabled for development
# cluster: {
#     name: "gotak-cluster"
#     port: 6222
# }

# TLS (disabled for development)
# tls: {
#     cert_file: "/etc/ssl/certs/nats.crt"
#     key_file: "/etc/ssl/private/nats.key"
# }

# Connection limits
max_connections: 1000
max_subscriptions: 1000
max_control_line: 2048
max_payload: 8388608  # 8MB

# Ping settings
ping_interval: "2m"
ping_max: 2

# Write deadline
write_deadline: "10s"
