# GoTAK Server Local Development Configuration
# This configuration is used when running the server locally (not in Docker)

server:
  name: "GoTAK Server"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8087
  
  # TAK-specific ports
  tcp_port: 8087
  udp_port: 8087
  tls_port: 8089
  
  # Web interface
  http_port: 8081
  web_port: 8081
  web_enabled: true
  serve_static: true
  
  # Performance settings
  max_connections: 1000
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  keepalive_interval: 30s

# Database configuration - pointing to local Docker PostgreSQL
database:
  host: "localhost"
  port: 5432
  database: "gotak_dev"
  username: "gotak"
  password: "dev_password"
  ssl_mode: "disable"
  
  # Connection pool settings
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300s

# Security settings
security:
  tls_enabled: false
  jwt_secret: "dev_jwt_secret_key_for_development_only"
  jwt_expiration: 24h
  
  # Password policy
  min_password_length: 8
  require_uppercase: true
  require_numbers: true
  require_symbols: false

# Logging configuration
logging:
  level: "debug"
  format: "json"
  output: "stdout"
  
# TAK settings
tak:
  server_name: "GoTAK Local Dev"
  server_uid: "GOTAK-LOCAL-DEV"
  
  # Message settings
  max_message_size: 8192
  message_timeout: 30s
  heartbeat_interval: 30s
  
  # CoT message settings
  default_stale: 5m
  max_stale: 60m
  enable_persistence: true
  
  # Group settings
  default_group: "__ANON__"
  allowed_groups: ["__ANON__", "Blue", "Red", "Green", "White"]
  
  # Federation settings
  federation:
    enabled: false