# GoTAK Server Configuration
# Example configuration for GoTAK server

server:
  name: "GoTAK Server"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8089
  
  # TAK-specific ports
  tcp_port: 8087
  udp_port: 8087
  tls_port: 8089
  
  # Web interface
  web_port: 8080
  web_enabled: true
  
  # Performance settings
  max_connections: 1000
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  keepalive_interval: 30s

database:
  host: "postgres"
  port: 5432
  database: "gotak"
  username: "gotak"
  password: "tactical_secure_pass"
  ssl_mode: "disable"
  
  # Connection pool settings
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

security:
  # TLS Configuration
  tls_enabled: false
  cert_file: "certs/server.crt"
  key_file: "certs/server.key"
  ca_file: "certs/ca.crt"
  
  # Client certificate authentication
  client_auth_required: false
  
  # JWT settings for web interface
  jwt_secret: "your-jwt-secret-key-change-this"
  jwt_expiration: 24h
  
  # Password policy
  min_password_length: 8
  require_uppercase: true
  require_numbers: true
  require_symbols: false

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: "/var/log/gotak/server.log"
  max_size: 100
  max_backups: 3
  max_age: 28

tak:
  # Server identification
  server_name: "GoTAK-Server"
  server_uid: "gotak-server-001"
  
  # Message settings
  max_message_size: 8192
  message_timeout: 30s
  heartbeat_interval: 60s
  
  # CoT message settings
  default_stale: 5m
  max_stale: 24h
  enable_persistence: true
  
  # Group settings
  default_group: "__ANON__"
  allowed_groups:
    - "__ANON__"
    - "Blue"
    - "Red"
    - "Green"
    - "White"
  
  # Federation settings
  federation:
    enabled: false
    peers: []
    # Example peer configuration:
    # - name: "Partner TAK Server"
    #   host: "partner.tak.server"
    #   port: 8089
    #   username: "federation"
    #   password: "password"
    #   groups: ["Blue", "Green"]
