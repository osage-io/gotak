# Redis configuration for GoTAK development

# Basic configuration
port 6379
bind 0.0.0.0
timeout 300
tcp-keepalive 60

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Append Only File
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Security
requirepass dev_redis_pass

# Logging
loglevel notice
logfile ""

# Client management
maxclients 1000

# Development settings
protected-mode no
tcp-backlog 511
databases 16

# Disable dangerous commands in development
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_69ac66"

# Keyspace notifications for session management
notify-keyspace-events "Ex"
