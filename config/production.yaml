# GoTAK Production Configuration
# This configuration is optimized for production deployment

# Server Configuration
server:
  host: "0.0.0.0"
  http_port: 8080
  tcp_port: 8087
  udp_port: 8087
  tls_port: 8089
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  max_header_bytes: 1048576

# Database Configuration
database:
  host: "${POSTGRES_HOST}"
  port: ${POSTGRES_PORT}
  name: "${POSTGRES_DB}"
  user: "${POSTGRES_USER}"
  password: "${POSTGRES_PASSWORD}"
  sslmode: "disable"  # Enable SSL in production with proper certificates
  timezone: "UTC"
  max_open_connections: 25
  max_idle_connections: 5
  connection_max_lifetime: "300s"
  connection_max_idle_time: "60s"

# Redis Configuration (for caching and sessions)
redis:
  host: "${REDIS_HOST}"
  port: ${REDIS_PORT}
  password: "${REDIS_PASSWORD}"
  database: 0
  pool_size: 10
  min_idle_connections: 1
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  pool_timeout: "4s"
  idle_timeout: "300s"

# Security Configuration
security:
  jwt:
    secret: "${JWT_SECRET}"
    access_token_duration: "24h"
    refresh_token_duration: "168h"  # 7 days
    issuer: "gotak-server"
  
  tls:
    enabled: true
    cert_file: "/app/certs/server.crt"
    key_file: "/app/certs/server.key"
    client_auth: "none"  # Options: none, request, require, verify
    min_version: "1.2"
    cipher_suites:
      - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
      - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
  
  cors:
    enabled: true
    allow_origins: 
      - "https://${GOTAK_SERVER_NAME:-localhost}"
    allow_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    allow_headers: ["Authorization", "Content-Type", "Accept", "Origin"]
    allow_credentials: true
    max_age: 3600

  rate_limiting:
    enabled: true
    requests_per_minute: 1000
    burst: 50
    cleanup_interval: "60s"

# Logging Configuration
logging:
  level: "${GOTAK_LOG_LEVEL}"
  format: "json"  # Options: text, json
  output: 
    - type: "file"
      path: "${GOTAK_LOG_DIR}/gotak.log"
      max_size: 100
      max_backups: 5
      max_age: 30
      compress: true
    - type: "stdout"
  
  # Log rotation settings
  rotation:
    enabled: true
    max_size: "100MB"
    max_files: 10
    max_days: 30
    compress: true

# TAK Protocol Configuration
tak:
  protocol_version: "2.0"
  max_message_size: 1048576  # 1MB
  heartbeat_interval: "30s"
  client_timeout: "300s"
  max_concurrent_connections: 10000
  
  # Message filtering
  message_filtering:
    enabled: true
    max_position_rate: 10  # positions per second per client
    max_chat_rate: 5       # chat messages per second per client
  
  # Client authentication
  client_auth:
    enabled: true
    require_certificate: false
    certificate_validation: "optional"

# Mapping Services Configuration
mapping:
  # Route Planning
  routing:
    provider: "osrm"  # Options: osrm, graphhopper, mapbox
    timeout: "30s"
    cache_enabled: true
    cache_ttl: "3600s"
  
  # Geocoding
  geocoding:
    provider: "nominatim"
    timeout: "10s"
    cache_enabled: true
    cache_ttl: "86400s"
  
  # Tile Services
  tiles:
    cache_enabled: true
    cache_dir: "${GOTAK_DATA_DIR}/tiles"
    max_cache_size: "10GB"
    cache_ttl: "2592000s"  # 30 days
  
  # Offline Maps
  offline_maps:
    enabled: true
    storage_dir: "${GOTAK_DATA_DIR}/offline_maps"
    max_storage_size: "50GB"
    download_workers: 4

# Real-time Features
realtime:
  websocket:
    enabled: true
    path: "/ws"
    read_buffer_size: 4096
    write_buffer_size: 4096
    max_message_size: 1048576
    ping_period: "54s"
    pong_wait: "60s"
    write_wait: "10s"
    max_connections_per_ip: 10
  
  # Message broadcasting
  broadcasting:
    enabled: true
    buffer_size: 1000
    workers: 4
    batch_size: 50
    flush_interval: "100ms"

# Performance Configuration
performance:
  # Connection pooling
  connection_pooling:
    enabled: true
    max_connections: 1000
    max_idle_connections: 100
    connection_timeout: "30s"
  
  # Caching
  caching:
    enabled: true
    default_ttl: "3600s"
    cleanup_interval: "300s"
    max_memory: "1GB"
  
  # Background processing
  background_jobs:
    enabled: true
    workers: 4
    queue_size: 1000
    retry_attempts: 3
    retry_delay: "30s"

# Monitoring and Health Checks
monitoring:
  metrics:
    enabled: true
    endpoint: "/metrics"
    namespace: "gotak"
  
  health:
    enabled: true
    endpoint: "/health"
    checks:
      - name: "database"
        enabled: true
        timeout: "5s"
        interval: "30s"
      - name: "redis"
        enabled: true
        timeout: "3s"
        interval: "30s"
      - name: "disk_space"
        enabled: true
        timeout: "2s"
        interval: "60s"
        threshold: "90%"

# File Storage Configuration
storage:
  local:
    enabled: true
    base_path: "${GOTAK_DATA_DIR}/storage"
    max_file_size: "100MB"
    allowed_types: [".jpg", ".jpeg", ".png", ".pdf", ".kml", ".kmz", ".gpx"]
  
  cleanup:
    enabled: true
    interval: "24h"
    max_age: "30d"

# Feature Flags
features:
  user_registration: true
  password_reset: true
  admin_api: true
  bulk_operations: true
  export_data: true
  import_data: true
  advanced_search: true
  audit_logging: true
  backup_restore: true

# Environment-specific settings
environment: "production"
debug: false
profiling: false

# Maintenance mode
maintenance:
  enabled: false
  message: "System is under maintenance. Please try again later."
  allowed_ips: []
