# GoTAK Integration Test Configuration
server:
  name: "GoTAK Test Server"
  version: "1.0.0"
  host: "0.0.0.0"  # Accept connections from containers
  tcp_port: 8087
  udp_port: 8087
  tls_port: 8089
  web_enabled: true
  web_port: 8080
  max_connections: 100
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"

database:
  host: "postgres-test"
  port: 5432
  database: "gotak_test"
  username: "gotak_test"
  password: "test_password"
  ssl_mode: "disable"
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: "1h"
  enable_query_log: true

security:
  tls_enabled: false
  client_auth_required: false
  jwt_secret: "test_jwt_secret_key_for_integration_tests"
  jwt_expiration: "24h"
  min_password_length: 6  # Relaxed for testing

logging:
  level: "debug"
  format: "json"
  output: "stdout"
  enable_caller: true
  enable_stacktrace: true

# CORS Configuration for testing
cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://frontend-test:3000"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Origin"
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"
  allow_credentials: true
  max_age: 86400

tak:
  server_name: "GoTAK-Test"
  server_uid: "test-server-001"
  max_message_size: 8192
  message_timeout: "30s"
  heartbeat_interval: "60s"
  default_stale: "5m"
  max_stale: "24h"
  enable_persistence: true  # Enable for testing
  enable_websocket: true
  websocket_path: "/ws"
  default_group: "test_group"
  allowed_groups:
    - "test_group"
    - "Team1"
    - "Team2"

# Mapping service configuration
mapping:
  osrm_url: ""  # Empty for direct calculation in tests
  tile_cache_dir: "/app/cache/tiles"
  max_route_waypoints: 50
  max_geofence_vertices: 100
  geofence_check_interval: "5s"
  offline_download_workers: 2
  max_offline_area_size: 10000

# Test-specific settings
test:
  enable_test_endpoints: true
  seed_test_data: true
  reset_db_on_start: false  # Don't reset during tests
  test_users:
    - username: "test_admin"
      password: "test123"
      role: "admin"
      group_id: "test_group"
    - username: "test_user1"
      password: "test123"
      role: "user"
      group_id: "test_group"
    - username: "test_user2"
      password: "test123"
      role: "user"
      group_id: "test_group"
